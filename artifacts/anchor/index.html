<!DOCTYPE html>
<html lang="nl" data-theme="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ────────────────────────────────────────── -->
    <!-- Prevent accidental pinch-zoom while retaining the stable iOS web-app viewport. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- ── Theme color ─────────────────────────────────────── -->
    <meta name="theme-color" content="#0D0C0B" />

    <!-- ── iOS / Safari specific ───────────────────────────── -->
    <!-- Enables Add to Home Screen / standalone launch -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Status bar overlays app (we control safe-area ourselves) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- App name shown under Home Screen icon -->
    <meta name="apple-mobile-web-app-title" content="Anchor" />
    <!-- Prevent iOS from auto-detecting / linking phone numbers -->
    <meta name="format-detection" content="telephone=no" />

    <!-- ── App description ─────────────────────────────────── -->
    <meta name="description" content="A private, offline-capable companion for addiction recovery support." />
    <meta name="application-name" content="Anchor - Substance Recovery" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Open Graph ──────────────────────────────────────── -->
    <meta property="og:title" content="Anchor — Substance Recovery" />
    <meta property="og:description" content="A private, offline-first companion for substance recovery." />
    <meta property="og:image" content="/opengraph.jpg" />

    <!-- ── Content Security Policy ───────────────────────── -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />

    <!-- ── Page title ──────────────────────────────────────── -->
    <title>Anchor - Substance Recovery</title>

    <!-- ── Icons ───────────────────────────────────────────── -->
    <!--
      apple-touch-icon: used by iOS for the Home Screen icon.
      Safari ignores manifest icons — this file is the ONLY source
      for the iOS Home Screen icon. Must be 180×180 for iPhone.
    -->
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <!-- Fallback favicon for browser tabs -->
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icon-192.png" />

    <!-- ── Fonts ───────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Prevent flash of white on load ──────────────────── -->
    <script>
      try {
        const savedTheme = localStorage.getItem("anchor-theme");
        const theme = savedTheme === "light" ? "light" : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.querySelector('meta[name="theme-color"]')?.setAttribute(
          "content",
          theme === "light" ? "#F7F5F3" : "#0D0C0B",
        );
      } catch {
        document.documentElement.dataset.theme = "dark";
        document.documentElement.classList.add("dark");
      }
    </script>
    <style>
      html,
      body {
        width: 100%;
        margin: 0;
        background: #0d0c0b;
      }

      html[data-theme="light"],
      html[data-theme="light"] body {
        background: #f7f5f3;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
